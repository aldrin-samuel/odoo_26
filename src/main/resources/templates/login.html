<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }
        h2 {
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 24px;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover { background-color: #2563eb; }
        .error {
            color: #e53e3e;
            background: #fff5f5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            border: 1px solid #feb2b2;
        }
        .demo-box {
            margin-top: 25px;
            background: #f7fafc;
            padding: 15px;
            border-radius: 6px;
            text-align: left;
            font-size: 13px;
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }
        .demo-box strong { color: #2d3748; display: block; margin-bottom: 8px; font-size: 14px; }
        .demo-box div { margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>🚚 TransitOps Login</h2>

    <!-- Error Message Display -->
    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form action="/login" method="post">
        <input type="email" name="email" placeholder="Email Address" required autofocus>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="demo-box">
        <strong>Hackathon Demo Accounts:</strong>
        <div><b>Fleet Manager:</b> admin@transitops.com / admin123</div>
        <div><b>Driver:</b> driver@transitops.com / driver123</div>
        <div><b>Safety Officer:</b> safety@transitops.com / safety123</div>
        <div><b>Financial Analyst:</b> finance@transitops.com / finance123</div>
    </div>
</div>

</body>
</html>
